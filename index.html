<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat with Claude Opus 4.6</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f10;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 780px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid #2a2a2e;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .model-badge {
      font-size: 12px;
      background: #7c3aed22;
      border: 1px solid #7c3aed66;
      color: #a78bfa;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #f0f0f0;
    }

    #chat-window {
      flex: 1;
      width: 100%;
      max-width: 780px;
      overflow-y: auto;
      padding: 24px 20px 10px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
    }

    .message.user .avatar   { background: #6d28d9; color: #fff; }
    .message.assistant .avatar { background: #1e1e22; border: 1px solid #3a3a42; font-size: 18px; }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #6d28d9;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #1e1e22;
      border: 1px solid #2a2a2e;
      color: #e8e8e8;
      border-bottom-left-radius: 4px;
    }

    .message.assistant .bubble.thinking {
      color: #666;
      font-style: italic;
    }

    #input-area {
      width: 100%;
      max-width: 780px;
      padding: 14px 20px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      border-top: 1px solid #2a2a2e;
    }

    #message-input {
      flex: 1;
      background: #1e1e22;
      border: 1px solid #2a2a2e;
      color: #e8e8e8;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #message-input:focus { border-color: #7c3aed; }
    #message-input::placeholder { color: #555; }

    #send-btn {
      background: #6d28d9;
      color: #fff;
      border: none;
      border-radius: 12px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) { background: #7c3aed; }
    #send-btn:active:not(:disabled) { transform: scale(0.94); }
    #send-btn:disabled { background: #3a3a42; cursor: not-allowed; }

    #send-btn svg { width: 20px; height: 20px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #444;
      user-select: none;
    }

    .empty-state .icon { font-size: 48px; }
    .empty-state p { font-size: 15px; }
  </style>
</head>
<body>

<header>
  <h1>Claude Chat</h1>
  <span class="model-badge">claude-opus-4-6</span>
</header>

<div id="chat-window">
  <div class="empty-state" id="empty-state">
    <div class="icon">✦</div>
    <p>Send a message to start chatting</p>
  </div>
</div>

<div id="input-area">
  <textarea
    id="message-input"
    placeholder="Message Claude Opus 4.6…"
    rows="1"
    autofocus
  ></textarea>
  <button id="send-btn" title="Send">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
  const chatWindow  = document.getElementById('chat-window');
  const input       = document.getElementById('message-input');
  const sendBtn     = document.getElementById('send-btn');
  const emptyState  = document.getElementById('empty-state');

  const MODEL = 'claude-opus-4-6';

  // Auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  // Send on Enter (Shift+Enter for newline)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function addMessage(role, text, extra = {}) {
    if (emptyState) emptyState.remove();

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (extra.thinking ? ' thinking' : '');
    bubble.textContent = text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;

    return bubble; // return so we can update it
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    // Clear input
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    input.disabled = true;

    addMessage('user', text);

    // Thinking indicator
    const thinkingBubble = addMessage('assistant', 'Thinking…', { thinking: true });

    try {
      const response = await puter.ai.chat(text, { model: MODEL });

      // Extract text from response
      let reply = '';
      if (typeof response === 'string') {
        reply = response;
      } else if (response?.message?.content) {
        const content = response.message.content;
        if (Array.isArray(content)) {
          reply = content.map(c => c.text ?? '').join('');
        } else {
          reply = String(content);
        }
      } else if (response?.text) {
        reply = response.text;
      } else {
        reply = JSON.stringify(response);
      }

      thinkingBubble.classList.remove('thinking');
      thinkingBubble.textContent = reply;
    } catch (err) {
      thinkingBubble.classList.remove('thinking');
      thinkingBubble.style.color = '#f87171';
      thinkingBubble.textContent = `Error: ${err.message ?? String(err)}`;
    }

    chatWindow.scrollTop = chatWindow.scrollHeight;
    sendBtn.disabled = false;
    input.disabled = false;
    input.focus();
  }
</script>

</body>
</html>
